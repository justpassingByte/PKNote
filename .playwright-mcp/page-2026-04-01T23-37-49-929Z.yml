              - text: Nhìn lại lịch sử
            - paragraph [ref=e218]: Điện ra đời — người ta sợ giật chết. Bitcoin xuất hiện — bị gọi là lừa đảo. AI bây giờ — cũng đang bị nghi ngờ y chang. Nhưng nhìn lại, toàn là thứ hiển nhiên mà ai đi trước đều hưởng lợi.
            - paragraph [ref=e219]: Ngoài kia AI viết code, AI trade, AI tự động hoá đủ thứ. Nhưng Poker vẫn đang ở thời kỳ "quạt tay" — note bằng tay, tự nhớ, nhìn HUD rồi tự dịch số. Đây là mảnh đất màu mỡ mà gần như chưa ai khai thác đúng cách.
          - generic [ref=e220]:
