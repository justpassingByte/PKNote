version: '3.8'

services:
  # 1. Database (Local Postgres)
  postgres:
    image: postgres:15-alpine
    container_name: notes_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-VilliantVault}
      POSTGRES_DB: ${DB_NAME:-ponotes}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    restart: always

  # 2. Redis for OCR Worker
  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
    restart: always

  # 3. OCR API (Python)
  ocr-api:
    build: ./backend/ocr-service
    container_name: ocr_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./backend/ocr-service/templates:/app/templates
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M
    restart: always

  # 4. OCR Worker (Heavy Machine Learning Part)
  ocr-worker:
    build: ./backend/ocr-service
    container_name: ocr_worker
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=1
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - PADDLE_NUM_THREADS=1
      - OMP_NUM_THREADS=1
    volumes:
      - ./backend/ocr-service/templates:/app/templates
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.2'
          memory: 2000M
    restart: always

  # 5. Backend API (Node.js/Prisma)
  backend:
    build: ./backend
    container_name: notes_backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-VilliantVault}@postgres:5432/${DB_NAME:-ponotes}?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-12345}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OCR_SERVICE_URL=http://ocr_api:8000
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY}
      - NOWPAYMENTS_IPN_SECRET=${NOWPAYMENTS_IPN_SECRET}
      - NOWPAYMENTS_SANDBOX=${NOWPAYMENTS_SANDBOX}
      - NOWPAYMENTS_SUCCESS_URL=${NOWPAYMENTS_SUCCESS_URL}
      - NOWPAYMENTS_CANCEL_URL=${NOWPAYMENTS_CANCEL_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 400M
    restart: always

  # 6. Frontend UI (Next.js Standalone)
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: notes_frontend
    environment:
      - PORT=3000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 400M
    restart: always

  # 7. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: notes_proxy
    ports:
      - "80:80"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  pgdata:
