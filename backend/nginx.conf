events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # Backend API server
    upstream backend_node {
        server backend:3001;
    }

    # Frontend UI server
    upstream frontend_next {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _; # Match all IPs/Domains

        # 1a. Next.js App Router API Routes (Frontend Actions)
        # Bắt tất cả các route có đuôi -action (login-action, register-action, reset-password-action...)
        location ~ ^/api/auth/.*-action$ {
            proxy_pass http://frontend_next;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Sử dụng Header của Cloudflare để lấy IP chuẩn của User
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # 1b. All other API requests → Express backend
        location /api {
            proxy_pass http://backend_node;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # support for large payloads (OCR)
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        # 2. Health check (mapped to backend root health)
        location /health {
            proxy_pass http://backend_node/health;
        }

        # 3. Frontend Requests
        location / {
            proxy_pass http://frontend_next;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
